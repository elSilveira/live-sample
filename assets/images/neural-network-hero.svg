<svg xmlns="http://www.w3.org/2000/svg" width="800" height="400" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#374151;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="neuralGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:0.8" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#bgGrad)"/>
  
  <!-- Neural Network Visualization -->
  <!-- Layer 1 -->
  <circle cx="150" cy="120" r="12" fill="url(#neuralGrad)"/>
  <circle cx="150" cy="180" r="12" fill="url(#neuralGrad)"/>
  <circle cx="150" cy="240" r="12" fill="url(#neuralGrad)"/>
  <circle cx="150" cy="300" r="12" fill="url(#neuralGrad)"/>
  
  <!-- Layer 2 -->
  <circle cx="300" cy="100" r="12" fill="url(#neuralGrad)"/>
  <circle cx="300" cy="160" r="12" fill="url(#neuralGrad)"/>
  <circle cx="300" cy="220" r="12" fill="url(#neuralGrad)"/>
  <circle cx="300" cy="280" r="12" fill="url(#neuralGrad)"/>
  <circle cx="300" cy="340" r="12" fill="url(#neuralGrad)"/>
  
  <!-- Layer 3 -->
  <circle cx="450" cy="140" r="12" fill="url(#neuralGrad)"/>
  <circle cx="450" cy="200" r="12" fill="url(#neuralGrad)"/>
  <circle cx="450" cy="260" r="12" fill="url(#neuralGrad)"/>
  
  <!-- Output -->
  <circle cx="600" cy="200" r="16" fill="#f59e0b"/>
  
  <!-- Connections -->
  <g stroke="#3b82f6" stroke-width="1" opacity="0.6">
    <!-- Layer 1 to Layer 2 connections -->
    <line x1="162" y1="120" x2="288" y2="100"/>
    <line x1="162" y1="120" x2="288" y2="160"/>
    <line x1="162" y1="180" x2="288" y2="160"/>
    <line x1="162" y1="180" x2="288" y2="220"/>
    <line x1="162" y1="240" x2="288" y2="220"/>
    <line x1="162" y1="240" x2="288" y2="280"/>
    <line x1="162" y1="300" x2="288" y2="280"/>
    <line x1="162" y1="300" x2="288" y2="340"/>
    
    <!-- Layer 2 to Layer 3 connections -->
    <line x1="312" y1="100" x2="438" y2="140"/>
    <line x1="312" y1="160" x2="438" y2="140"/>
    <line x1="312" y1="160" x2="438" y2="200"/>
    <line x1="312" y1="220" x2="438" y2="200"/>
    <line x1="312" y1="220" x2="438" y2="260"/>
    <line x1="312" y1="280" x2="438" y2="260"/>
    
    <!-- Layer 3 to Output connections -->
    <line x1="462" y1="140" x2="584" y2="200"/>
    <line x1="462" y1="200" x2="584" y2="200"/>
    <line x1="462" y1="260" x2="584" y2="200"/>
  </g>
  
  <!-- Title -->
  <text x="400" y="50" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white">
    BitNet Neural Architecture
  </text>
  
  <!-- Subtitle -->
  <text x="400" y="380" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#9ca3af">
    1-bit Neural Networks • 94% Energy Reduction • Quantum-Enhanced Processing
  </text>
  
  <!-- Binary indicators -->
  <text x="120" y="120" text-anchor="middle" font-family="monospace" font-size="10" fill="white">1</text>
  <text x="120" y="180" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
  <text x="120" y="240" text-anchor="middle" font-family="monospace" font-size="10" fill="white">1</text>
  <text x="120" y="300" text-anchor="middle" font-family="monospace" font-size="10" fill="white">0</text>
</svg>
